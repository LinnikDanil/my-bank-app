services:
  bank-db:
    container_name: bank-db
    image: postgres:17.5
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - ./dev/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db-data:/var/lib/postgresql/data
    networks:
      - bank-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bank-network

  kafka:
    container_name: kafka
    image: bitnami/kafka:4.0
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_LOG_RETENTION_HOURS: "168"
      KAFKA_KRAFT_CLUSTER_ID: MDEyMzQ1Njc4OTAxMjM0NQ==
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_CFG_NUM_PARTITIONS: "3"
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - bank-network

  front-app:
    container_name: front-app
    build:
      context: ./front
      dockerfile: Dockerfile
    image: front-app
    restart: on-failure
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: "8086"
      FRONT_CLIENT_ID: front
      FRONT_CLIENT_SECRET: front-secret
      FRONT_AUTHORIZATION_URI: http://localhost:8080/realms/my-bank-realm/protocol/openid-connect/auth
      FRONT_TOKEN_URI: http://keycloak:8080/realms/my-bank-realm/protocol/openid-connect/token
      FRONT_USER_INFO_URI: http://keycloak:8080/realms/my-bank-realm/protocol/openid-connect/userinfo
      FRONT_JWK_SET_URI: http://keycloak:8080/realms/my-bank-realm/protocol/openid-connect/certs
      FRONT_ACCOUNT_BASE_URL: http://account-app:8082
      FRONT_CASH_BASE_URL: http://cash-app:8083
      FRONT_TRANSFER_BASE_URL: http://transfer-app:8084
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - bank-network

  account-app:
    container_name: account-app
    build:
      context: ./account
      dockerfile: Dockerfile
    image: account-app
    restart: on-failure
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: "8082"
      DATASOURCE_SCHEMA_NAME: bank_app
      SPRING_DATASOURCE_URL: jdbc:postgresql://bank-db:5432/bank?currentSchema=bank_app
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NOTIFICATION_TOPIC: notification-events
      ACCOUNT_JWT_ISSUER_URI: http://localhost:8080/realms/my-bank-realm
      ACCOUNT_JWT_JWK_SET_URI: http://keycloak:8080/realms/my-bank-realm/protocol/openid-connect/certs
    depends_on:
      bank-db:
        condition: service_started
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - bank-network

  cash-app:
    container_name: cash-app
    build:
      context: ./cash
      dockerfile: Dockerfile
    image: cash-app
    restart: on-failure
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: "8083"
      ACCOUNT_BASE_URL: http://account-app:8082
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NOTIFICATION_TOPIC: notification-events
      CASH_JWT_ISSUER_URI: http://localhost:8080/realms/my-bank-realm
      CASH_JWT_JWK_SET_URI: http://keycloak:8080/realms/my-bank-realm/protocol/openid-connect/certs
      CASH_CLIENT_ID: cash-service
      CASH_CLIENT_SECRET: cash-secret
      CASH_OAUTH2_TOKEN_URI: http://keycloak:8080/realms/my-bank-realm/protocol/openid-connect/token
      CASH_OUTBOUND_OAUTH2_REGISTRATION_ID: cash-service-client
    depends_on:
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - bank-network

  transfer-app:
    container_name: transfer-app
    build:
      context: ./transfer
      dockerfile: Dockerfile
    image: transfer-app
    restart: on-failure
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: "8084"
      ACCOUNT_BASE_URL: http://account-app:8082
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NOTIFICATION_TOPIC: notification-events
      TRANSFER_JWT_ISSUER_URI: http://localhost:8080/realms/my-bank-realm
      TRANSFER_JWT_JWK_SET_URI: http://keycloak:8080/realms/my-bank-realm/protocol/openid-connect/certs
      TRANSFER_CLIENT_ID: transfer-service
      TRANSFER_CLIENT_SECRET: transfer-secret
      TRANSFER_OAUTH2_TOKEN_URI: http://keycloak:8080/realms/my-bank-realm/protocol/openid-connect/token
      TRANSFER_OUTBOUND_OAUTH2_REGISTRATION_ID: transfer-service-client
    depends_on:
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - bank-network

  notification-app:
    container_name: notification-app
    build:
      context: ./notification
      dockerfile: Dockerfile
    image: notification-app
    restart: on-failure
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: "8085"
      DATASOURCE_SCHEMA_NAME: notification_app
      SPRING_DATASOURCE_URL: jdbc:postgresql://bank-db:5432/bank?currentSchema=notification_app
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NOTIFICATION_TOPIC: notification-events
      NOTIFICATION_CONSUMER_GROUP_ID: notification-service
    depends_on:
      kafka:
        condition: service_started
    networks:
      - bank-network

volumes:
  db-data:
  kafka-data:

networks:
  bank-network:
