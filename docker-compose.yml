services:
  bank-db:
    container_name: bank-db
    image: postgres:17.5
    restart: always
    mem_limit: 384m
    env_file:
      - ./env/bank-db.env
    ports:
      - "5433:5432"
    volumes:
      - ./dev/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db-data:/var/lib/postgresql/data
    networks:
      - bank-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: ["start-dev", "--import-realm"]
    mem_limit: 768m
    env_file:
      - ./env/keycloak.env
    environment:
      JAVA_OPTS_KC_HEAP: "-Xms128m -Xmx512m"
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bank-network

  kafka:
    container_name: kafka
    image: bitnamilegacy/kafka:4.0.0-debian-12-r3
    restart: always
    mem_limit: 768m
    ports:
      - "9092:9092"
    env_file:
      - ./env/kafka.env
    environment:
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - bank-network

  front-app:
    container_name: front-app
    build:
      context: .
      dockerfile: front/Dockerfile
    image: front-app:1.2.0
    restart: on-failure
    mem_limit: 384m
    ports:
      - "8086:8086"
    env_file:
      - ./env/front-app.env
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - bank-network

  account-app:
    container_name: account-app
    build:
      context: .
      dockerfile: account/Dockerfile
    image: account-app:1.2.0
    restart: on-failure
    mem_limit: 384m
    ports:
      - "8082:8082"
    env_file:
      - ./env/account-app.env
    depends_on:
      bank-db:
        condition: service_started
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - bank-network

  cash-app:
    container_name: cash-app
    build:
      context: .
      dockerfile: cash/Dockerfile
    image: cash-app:1.2.0
    restart: on-failure
    mem_limit: 384m
    ports:
      - "8083:8083"
    env_file:
      - ./env/cash-app.env
    depends_on:
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - bank-network

  transfer-app:
    container_name: transfer-app
    build:
      context: .
      dockerfile: transfer/Dockerfile
    image: transfer-app:1.2.0
    restart: on-failure
    mem_limit: 384m
    ports:
      - "8084:8084"
    env_file:
      - ./env/transfer-app.env
    depends_on:
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - bank-network

  notification-app:
    container_name: notification-app
    build:
      context: .
      dockerfile: notification/Dockerfile
    image: notification-app:1.2.0
    restart: on-failure
    mem_limit: 384m
    ports:
      - "8085:8085"
    env_file:
      - ./env/notification-app.env
    depends_on:
      kafka:
        condition: service_started
    networks:
      - bank-network

volumes:
  db-data:
  kafka-data:

networks:
  bank-network:
