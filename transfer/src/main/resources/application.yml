spring:
  application:
    name: transfer
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
    default-schema: ${DATASOURCE_SCHEMA_NAME}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${TRANSFER_JWT_ISSUER_URI}
          jwk-set-uri: ${TRANSFER_JWT_JWK_SET_URI}
      client:
        registration:
          transfer-service-client:
            provider: keycloak
            authorization-grant-type: client_credentials
            client-id: ${TRANSFER_CLIENT_ID}
            client-secret: ${TRANSFER_CLIENT_SECRET}
        provider:
          keycloak:
            token-uri: ${TRANSFER_OAUTH2_TOKEN_URI}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: ${KAFKA_PRODUCER_ACKS}
      retries: ${KAFKA_PRODUCER_RETRIES}
      properties:
        enable.idempotence: ${KAFKA_PRODUCER_ENABLE_IDEMPOTENCE}

server:
  port: ${SERVER_PORT}

integration:
  oauth2:
    registration-id: ${TRANSFER_OUTBOUND_OAUTH2_REGISTRATION_ID}
  account:
    base-url: ${ACCOUNT_BASE_URL}
  notification:
    topic: ${NOTIFICATION_TOPIC}

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        slidingWindowType: ${RESILIENCE4J_ACCOUNT_CB_SLIDING_WINDOW_TYPE}
        slidingWindowSize: ${RESILIENCE4J_ACCOUNT_CB_SLIDING_WINDOW_SIZE}
        minimumNumberOfCalls: ${RESILIENCE4J_ACCOUNT_CB_MINIMUM_NUMBER_OF_CALLS}
        permittedNumberOfCallsInHalfOpenState: ${RESILIENCE4J_ACCOUNT_CB_PERMITTED_CALLS_HALF_OPEN}
        waitDurationInOpenState: ${RESILIENCE4J_ACCOUNT_CB_WAIT_DURATION_OPEN_STATE}
        failureRateThreshold: ${RESILIENCE4J_ACCOUNT_CB_FAILURE_RATE_THRESHOLD}
      notificationService:
        slidingWindowType: ${RESILIENCE4J_NOTIFICATION_CB_SLIDING_WINDOW_TYPE}
        slidingWindowSize: ${RESILIENCE4J_NOTIFICATION_CB_SLIDING_WINDOW_SIZE}
        minimumNumberOfCalls: ${RESILIENCE4J_NOTIFICATION_CB_MINIMUM_NUMBER_OF_CALLS}
        permittedNumberOfCallsInHalfOpenState: ${RESILIENCE4J_NOTIFICATION_CB_PERMITTED_CALLS_HALF_OPEN}
        waitDurationInOpenState: ${RESILIENCE4J_NOTIFICATION_CB_WAIT_DURATION_OPEN_STATE}
        failureRateThreshold: ${RESILIENCE4J_NOTIFICATION_CB_FAILURE_RATE_THRESHOLD}
  retry:
    instances:
      accountService:
        maxAttempts: ${RESILIENCE4J_ACCOUNT_RETRY_MAX_ATTEMPTS}
        waitDuration: ${RESILIENCE4J_ACCOUNT_RETRY_WAIT_DURATION}
        ignoreExceptions:
          - ru.practicum.transfer.domain.exception.InvalidAmountException
          - ru.practicum.transfer.domain.exception.AccountNotFoundException
          - ru.practicum.transfer.domain.exception.InsufficientFundsException
      notificationService:
        maxAttempts: ${RESILIENCE4J_NOTIFICATION_RETRY_MAX_ATTEMPTS}
        waitDuration: ${RESILIENCE4J_NOTIFICATION_RETRY_WAIT_DURATION}

transfer:
  outbox:
    poll-delay-ms: ${TRANSFER_OUTBOX_POLL_DELAY_MS:2000}
    retry-delay-ms: ${TRANSFER_OUTBOX_RETRY_DELAY_MS:5000}
    max-attempts: ${TRANSFER_OUTBOX_MAX_ATTEMPTS:10}
