spring:
  application:
    name: front
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${FRONT_CLIENT_ID}
            client-secret: ${FRONT_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
        provider:
          keycloak:
            authorization-uri: ${FRONT_AUTHORIZATION_URI}
            token-uri: ${FRONT_TOKEN_URI}
            user-info-uri: ${FRONT_USER_INFO_URI}
            user-name-attribute: preferred_username
            jwk-set-uri: ${FRONT_JWK_SET_URI}

server:
  port: ${SERVER_PORT}

front:
  api:
    account-base-url: ${FRONT_ACCOUNT_BASE_URL}
    cash-base-url: ${FRONT_CASH_BASE_URL}
    transfer-base-url: ${FRONT_TRANSFER_BASE_URL}
