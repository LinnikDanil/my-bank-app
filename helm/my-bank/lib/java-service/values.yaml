nameOverride: ""

replicaCount: 1

image:
  repository: app
  tag: latest
  pullPolicy: IfNotPresent

service:
  enabled: true
  port: 8080

env: {}
secretEnv: {}

probes:
  startup:
    enabled: true
    initialDelaySeconds: 20
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 60
  readiness:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
  liveness:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6

resources:
  requests:
    cpu: 100m
    memory: 192Mi
  limits:
    cpu: 500m
    memory: 384Mi
