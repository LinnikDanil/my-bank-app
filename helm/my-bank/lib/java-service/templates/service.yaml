{{- if .Values.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "java-service.name" . }}
  labels:
    app.kubernetes.io/name: {{ include "java-service.name" . }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "java-service.name" . }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
{{- end }}
