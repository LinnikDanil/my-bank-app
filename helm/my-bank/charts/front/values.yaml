app:
  nameOverride: front

  replicaCount: 1

  image:
    repository: front-app
    tag: 1.1.0
    pullPolicy: IfNotPresent

  service:
    port: 8086

  env: {}
  secretEnv: {}

  probes:
    startup:
      enabled: true
      initialDelaySeconds: 20
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 60
    readiness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 6
    liveness:
      enabled: true
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 6

  resources: {}
