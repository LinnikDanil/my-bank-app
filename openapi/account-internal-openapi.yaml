openapi: 3.0.3
info:
  title: Account Service Internal API
  description: Внутреннее API сервиса аккаунтов для изменения баланса.
  version: 1.0.0

tags:
  - name: account-internal
    description: Внутренние операции изменения баланса

security:
  - bearerAuth: []

paths:
  /internal/v1/accounts/{username}/deposit:
    post:
      tags: [ account-internal ]
      operationId: internalDeposit
      summary: Внесение денег на счёт пользователя
      description: |
        Внутренний endpoint для сервисов Cash/Transfer.
        Требуемые authority: `CASH` или `TRANSFER`.
      parameters:
        - $ref: '#/components/parameters/UsernamePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoneyAmountRequest'
      responses:
        '200':
          description: Баланс успешно пополнен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'

  /internal/v1/accounts/{username}/withdraw:
    post:
      tags: [ account-internal ]
      operationId: internalWithdraw
      summary: Снятие денег со счёта пользователя
      description: |
        Внутренний endpoint для сервисов Cash/Transfer.
        Требуемые authority: `CASH` или `TRANSFER`.
      parameters:
        - $ref: '#/components/parameters/UsernamePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoneyAmountRequest'
      responses:
        '200':
          description: Деньги успешно списаны
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UsernamePath:
      name: username
      in: path
      required: true
      description: Username пользователя
      schema:
        $ref: '#/components/schemas/Username'

  responses:
    BadRequestError:
      description: Некорректный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Неавторизованный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Недостаточно прав для вызова Account service
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Аккаунт не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: Бизнес-конфликт (например, недостаточно средств)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Внутренняя ошибка Account service
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailableError:
      description: Сервис временно недоступен
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    Username:
      type: string
      minLength: 5
      maxLength: 64
      pattern: '^[A-Za-z0-9._-]+$'
      example: IvanIvanov

    MoneyAmount:
      type: number
      minimum: 0.01
      maximum: 1000000000
      multipleOf: 0.01
      example: 1000.50

    MoneyAmountRequest:
      type: object
      additionalProperties: false
      required:
        - amount
      properties:
        amount:
          $ref: '#/components/schemas/MoneyAmount'

    BalanceResponse:
      type: object
      additionalProperties: false
      required:
        - username
        - balance
      properties:
        username:
          $ref: '#/components/schemas/Username'
        balance:
          type: number
          minimum: 0
          maximum: 1000000000
          multipleOf: 0.01
          example: 2510.20

    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          minLength: 2
          maxLength: 120
          pattern: '^[A-Z0-9_]+$'
          example: INSUFFICIENT_FUNDS
        message:
          type: string
          minLength: 1
          maxLength: 500
          pattern: '.*\\S.*'
          example: Недостаточно средств на балансе
        timestamp:
          type: string
          format: date-time
          example: '2026-03-19T12:34:56Z'
