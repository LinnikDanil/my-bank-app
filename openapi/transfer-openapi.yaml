openapi: 3.0.3
info:
  title: Transfer Service API
  description: API сервиса переводов между счетами пользователей.
  version: 1.0.0

tags:
  - name: transfer
    description: Переводы между пользователями

security:
  - bearerAuth: []

paths:
  /api/v1/transfers:
    post:
      tags: [ transfer ]
      operationId: createTransfer
      summary: Перевод средств другому пользователю
      description: |
        Выполняет перевод со счёта пользователя из JWT на счёт `usernameTo`.
        Требуемая роль: `ROLE_USER`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '200':
          description: Перевод успешно выполнен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequestError:
      description: Некорректный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Неавторизованный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Недостаточно прав для вызова Transfer service
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Пользователь не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: Бизнес-конфликт (например, недостаточно средств)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Внутренняя ошибка Transfer service
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailableError:
      description: Сервис временно недоступен
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    Username:
      type: string
      minLength: 5
      maxLength: 64
      pattern: '^[A-Za-z0-9._-]+$'
      example: IvanIvanov

    MoneyAmount:
      type: number
      minimum: 0.01
      maximum: 1000000000
      multipleOf: 0.01
      example: 250.00

    TransferRequest:
      type: object
      additionalProperties: false
      required:
        - usernameTo
        - amount
      properties:
        usernameTo:
          $ref: '#/components/schemas/Username'
        amount:
          $ref: '#/components/schemas/MoneyAmount'

    TransferResponse:
      type: object
      additionalProperties: false
      required:
        - usernameFrom
        - usernameTo
        - amount
      properties:
        usernameFrom:
          $ref: '#/components/schemas/Username'
        usernameTo:
          $ref: '#/components/schemas/Username'
        amount:
          $ref: '#/components/schemas/MoneyAmount'

    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          minLength: 2
          maxLength: 120
          pattern: '^[A-Z0-9_]+$'
          example: INSUFFICIENT_FUNDS
        message:
          type: string
          minLength: 1
          maxLength: 500
          pattern: '.*\\S.*'
          example: Недостаточно средств на балансе
        timestamp:
          type: string
          format: date-time
          example: '2026-03-19T12:34:56Z'
