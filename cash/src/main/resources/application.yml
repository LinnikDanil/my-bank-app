spring:
  application:
    name: cash
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${CASH_JWT_ISSUER_URI}
          jwk-set-uri: ${CASH_JWT_JWK_SET_URI}
      client:
        registration:
          cash-service-client:
            provider: keycloak
            authorization-grant-type: client_credentials
            client-id: ${CASH_CLIENT_ID}
            client-secret: ${CASH_CLIENT_SECRET}
        provider:
          keycloak:
            token-uri: ${CASH_OAUTH2_TOKEN_URI}

server:
  port: ${SERVER_PORT}

integration:
  oauth2:
    registration-id: ${CASH_OUTBOUND_OAUTH2_REGISTRATION_ID}
  account:
    base-url: ${ACCOUNT_BASE_URL}
  notification:
    base-url: ${NOTIFICATION_BASE_URL}

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      notificationService:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
  retry:
    instances:
      accountService:
        maxAttempts: 3
        waitDuration: 300ms
        ignoreExceptions:
          - ru.practicum.cash.domain.exception.InvalidAmountException
          - ru.practicum.cash.domain.exception.AccountNotFoundException
          - ru.practicum.cash.domain.exception.InsufficientFundsException
      notificationService:
        maxAttempts: 3
        waitDuration: 300ms
